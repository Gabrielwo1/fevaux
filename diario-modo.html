<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Feva – Como registrar</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="assets/design-system.css"><style>
.shell-c{background:linear-gradient(180deg,#eaf4f1,#f6faf8)}
.dm-back{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(255,255,255,.35),rgba(42,50,49,.45));backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:5}
.dm-sheet{position:absolute;left:0;right:0;bottom:72px;z-index:10;background:#f3f6f8;border:1px solid #cdddd9;border-bottom:none;border-radius:24px 24px 0 0;padding:24px 21px 22px;display:flex;flex-direction:column;gap:16px;box-shadow:0 -8px 30px rgba(0,0,0,.12);animation:sheetUp .5s var(--ease-card) both}
@keyframes sheetUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
.dm-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.dm-title{font-family:var(--font);font-weight:700;font-size:22px;color:#023e44}
.dm-sub{font-family:var(--font);font-weight:400;font-size:14px;color:#6b7c80;margin-top:4px}
.dm-back-ic{flex-shrink:0;width:20px;height:20px;stroke:#023e44;margin-top:4px}
.dm-opt{display:flex;align-items:center;justify-content:space-between;gap:14px;background:#fff;border:1.5px solid transparent;border-radius:16px;padding:16px 20px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:border-color .2s var(--ease-card),transform .12s}
.dm-opt:active{transform:scale(.99)}
.dm-opt .tx{display:flex;flex-direction:column;gap:3px}
.dm-opt .tn{font-family:var(--font);font-weight:700;font-size:16px;color:#023e44}
.dm-opt .td{font-family:var(--font);font-weight:400;font-size:13px;color:#8a9a9a}
.dm-radio{width:22px;height:22px;border-radius:50%;border:2px solid #cfd8d8;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:border-color .2s}
.dm-opt.sel{border-color:#2e8278}
.dm-opt.sel .dm-radio{border-color:#13b3a6}
.dm-opt.sel .dm-radio::after{content:"";width:11px;height:11px;border-radius:50%;background:#13b3a6}
.dm-cta{display:flex;align-items:center;justify-content:center;gap:10px;height:51px;border-radius:15px;background:var(--grad-primary);font-family:var(--font);font-weight:600;font-size:16px;color:#fff;text-decoration:none;margin-top:6px}
.dm-cta svg{width:16px;height:16px;stroke:#fff}
.bottomnav{position:absolute;left:0;right:0;bottom:0;background:#2e8278;border-radius:12px 12px 0 0;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;z-index:20;overflow:hidden}
.bottomnav .navglow{position:absolute;inset:-39px;border-radius:9999px;background:rgba(20,184,166,.1);filter:blur(32px);pointer-events:none}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;position:relative;z-index:2}
.nav-item svg{width:20px;height:22px;display:block;stroke:#90c1a5}
.nav-item span{font-family:var(--font);font-weight:700;font-size:12px;line-height:16px;color:#90c1a5;letter-spacing:1.2px}
.nav-item .feva-ico{width:22px;height:22px;display:block;opacity:.55}.nav-item.active .feva-ico{opacity:1}.nav-item.active svg{stroke:#fff}
.nav-item.active span{color:#fff}
</style></head><body><div class="shell shell-c">
<div class="dm-back"></div>
<div class="dm-sheet">
  <div class="dm-head">
    <div>
      <p class="dm-title">Como quer registrar</p>
      <p class="dm-sub">Escolha o que combina com você agora</p>
    </div>
    <a href="diario.html"><svg class="dm-back-ic" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg></a>
  </div>
  <div data-single style="display:flex;flex-direction:column;gap:12px">
    <div class="dm-opt"><div class="tx"><span class="tn">Registro rápido</span><span class="td">Preencha você mesmo, mais rápido</span></div><div class="dm-radio"></div></div>
    <div class="dm-opt sel"><div class="tx"><span class="tn">Reflexão com FEVA</span><span class="td">Guiado pela IA, mais profundo</span></div><div class="dm-radio"></div></div>
  </div>
  <a href="diario-registro.html" class="dm-cta">Continuar <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></a>
</div>
<nav class="bottomnav">
  <div class="navglow"></div>
  <a href="dashboard.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20h14V9.5"/><path d="M9.5 20v-5h5v5"/></svg><span>Início</span></a>
  <a href="jornada.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4 3 6v14l6-2 6 2 6-2V4l-6 2-6-2Z"/><path d="M9 4v14M15 6v14"/></svg><span>Jornada</span></a>
  <a href="feva.html" class="nav-item"><img class="feva-ico" src="assets/feva-icon.png" alt=""/><span>Feva</span></a>
  <a href="explorar.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m15 9-2 5-4 1 2-5 4-1Z"/></svg><span>Explorar</span></a>
  <a href="perfil.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M5 20c0-3.5 3-6 7-6s7 2.5 7 6"/></svg><span>Eu</span></a>
</nav>
<script>
document.querySelectorAll('[data-single] .dm-opt').forEach(function(it,_,all){
  it.addEventListener('click',function(){ all.forEach(function(x){x.classList.remove('sel');}); it.classList.add('sel'); });
});
</script>
</div></body></html>
