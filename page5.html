<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Feva – Faixa Etária</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="assets/design-system.css"><style>.drum-wrap{position:absolute;left:55px;top:220px;width:280px;z-index:10}
.drum-viewport{position:relative;height:320px;overflow:hidden}
.drum-viewport::before,.drum-viewport::after{content:'';position:absolute;left:0;width:100%;height:96px;z-index:2;pointer-events:none}
.drum-viewport::before{top:0;background:linear-gradient(to bottom,rgba(248,251,252,1) 0%,rgba(248,251,252,0) 100%)}
.drum-viewport::after{bottom:0;background:linear-gradient(to top,rgba(248,251,252,1) 0%,rgba(248,251,252,0) 100%)}
.drum-highlight{position:absolute;top:50%;transform:translateY(-50%);left:0;width:100%;height:64px;background:rgba(46,130,120,.12);border-radius:var(--radius-card);pointer-events:none;z-index:1}
.drum-scroll{height:100%;overflow-y:auto;scroll-snap-type:y mandatory;scrollbar-width:none}
.drum-scroll::-webkit-scrollbar{display:none}
.drum-pad{height:128px;flex-shrink:0}
.drum-item{height:64px;display:flex;align-items:center;justify-content:center;scroll-snap-align:center;cursor:pointer;transition:opacity .15s,color .15s;font-family:var(--font);font-size:20px;font-weight:600;color:#464652;white-space:nowrap;position:relative;z-index:3}
.drum-item.active{color:var(--color-accent)}</style></head><body><div class="shell"><div style="position:absolute;left:-148px;top:-114px;width:615px;height:1143px;pointer-events:none;z-index:1"><img src="assets/onboarding-bg.svg" alt="" style="width:100%;height:100%;display:block"/></div><div style="position:absolute;left:445px;top:153px;width:14px;height:14px;border-radius:50%;background:#442952;opacity:.1;z-index:2"></div><div class="prog-bg"></div><div class="prog-fill" style="width:58px"></div><div class="topbar"><span class="etapa">Etapa 3</span><a href="page4.html" class="back-btn"><img src="assets/back-icon.svg" alt=""/></a></div><div class="anim-up d1" style="position:absolute;left:18px;top:110px;width:355px;display:flex;flex-direction:column;gap:16px;z-index:10"><h2 style="font-size:22px;font-weight:600;color:#023e44;line-height:1.3">Qual a sua faixa <span style="color:#13919d">etária?</span></h2><p style="font-size:14px;color:#555;line-height:1.5">Isso ajuda a personalizar a experiência</p></div><div class="drum-wrap anim-up d2"><div class="drum-viewport"><div class="drum-highlight"></div><div class="drum-scroll" id="drum"><div class="drum-pad"></div><div class="drum-item" data-idx="0">Abaixo de 18</div><div class="drum-item" data-idx="1">18 – 24 anos</div><div class="drum-item" data-idx="2">25 – 34 anos</div><div class="drum-item" data-idx="3">35 – 44 anos</div><div class="drum-item" data-idx="4">45 – 54 anos</div><div class="drum-item" data-idx="5">55 – 64 anos</div><div class="drum-item" data-idx="6">65+ anos</div><div class="drum-pad"></div></div></div></div><div class="btn-wrap"><a href="page6.html" class="btn"><span>Continuar</span><img class="arr" src="assets/arrow.svg" alt=""/></a></div>
<script>
(function(){
  var drum = document.getElementById('drum');
  var items = drum.querySelectorAll('.drum-item');
  var ITEM_H = 64;
  var activeIdx = 2;

  function updateOpacity(){
    items.forEach(function(el){
      var idx = parseInt(el.dataset.idx);
      var dist = Math.abs(idx - activeIdx);
      var opacities = [1, 0.6, 0.4, 0.3, 0.2, 0.15, 0.1];
      el.style.opacity = opacities[Math.min(dist, opacities.length-1)];
      if(dist===0){el.classList.add('active');}else{el.classList.remove('active');}
    });
  }

  drum.addEventListener('scroll', function(){
    var idx = Math.round(drum.scrollTop / ITEM_H);
    idx = Math.max(0, Math.min(idx, items.length - 1));
    if(idx !== activeIdx){ activeIdx = idx; updateOpacity(); }
  });

  items.forEach(function(el){
    el.addEventListener('click', function(){
      activeIdx = parseInt(el.dataset.idx);
      drum.scrollTo({top: activeIdx * ITEM_H, behavior:'smooth'});
      updateOpacity();
    });
  });

  // init scroll to idx 2 (25–34 anos)
  drum.scrollTop = activeIdx * ITEM_H;
  updateOpacity();
})();
</script>
</div></body></html>
