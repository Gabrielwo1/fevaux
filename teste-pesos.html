<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Feva – Etapa 12</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="assets/design-system.css"><style>
.shell-light{background:#f7f7f9}
.t-title{position:absolute;left:26px;top:100px;width:344px;font-family:var(--font);font-weight:600;font-size:22px;line-height:1.3;color:#023e44;z-index:5}
.t-sub{position:absolute;left:26px;top:170px;width:344px;font-family:var(--font);font-weight:400;font-size:14px;color:#6b7c80;z-index:5}
.t-grid{position:absolute;left:26px;right:26px;top:204px;bottom:118px;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;gap:14px;align-content:start;z-index:5}
.t-grid::-webkit-scrollbar{display:none}
.t-cell{position:relative;background:#fff;border:1.5px solid transparent;border-radius:18px;padding:16px;min-height:104px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.05);transition:border-color .2s var(--ease-card),box-shadow .2s,transform .12s}
.t-cell:active{transform:scale(.98)}
.t-cell .ic{width:36px;height:36px;border-radius:9999px;background:#eef5f3;display:flex;align-items:center;justify-content:center}
.t-cell .ic svg{width:19px;height:19px;stroke:#13919d}
.t-cell .lbl{font-family:var(--font);font-weight:500;font-size:15px;line-height:1.3;color:#374151}
.t-cell .badge{position:absolute;right:14px;top:14px;width:22px;height:22px;border-radius:9999px;background:#2e8278;display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(.6);transition:opacity .2s,transform .2s var(--ease-spring)}
.t-cell .badge svg{width:13px;height:13px;stroke:#fff}
.t-cell.sel{border-color:#2e8278;background:#f1f8f6;box-shadow:0 6px 18px rgba(46,130,120,.14)}
.t-cell.sel .badge{opacity:1;transform:scale(1)}
.btn.dis{filter:grayscale(.5);opacity:.55;pointer-events:none;box-shadow:none}
</style></head><body><div class="shell shell-light">

<script>
(function(){var cta=document.getElementById('cta');var cells=document.querySelectorAll('.t-grid[data-multi] .t-cell');cells.forEach(function(c){c.addEventListener('click',function(){c.classList.toggle('sel');var any=Array.prototype.some.call(cells,function(x){return x.classList.contains('sel')});cta.classList.toggle('dis',!any);})})})();
